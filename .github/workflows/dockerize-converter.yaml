name: Converter Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'src/converter/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/converter/**'

env:
  IMAGE_NAME: aniketpuro/converter-service

permissions:
  contents: write

jobs:
  build-test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short Commit SHA
        id: vars
        run: echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest waitress flask-talisman
          if [ -f src/converter/requirements.txt ]; then pip install -r src/converter/requirements.txt; fi

      - name: Run Linter
        run: flake8 src/converter --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Build Docker Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} ./src/converter

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft docker:${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} -o spdx-json > sbom-converter-${{ env.COMMIT_SHA }}.json
          if [ ! -s sbom-converter-${{ env.COMMIT_SHA }}.json ]; then echo "SBOM file is empty or not created"; exit 1; fi
          ls -l sbom-converter-${{ env.COMMIT_SHA }}.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Sign Image and Attach SBOM
        if: github.event_name == 'push'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          # Sign the image
          cosign sign --key cosign.key ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} --yes
          # Attest the SBOM
          if [ -f sbom-converter-${{ env.COMMIT_SHA }}.json ]; then
            cosign attest --key cosign.key --predicate sbom-converter-${{ env.COMMIT_SHA }}.json --type spdxjson ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} --yes
          else
            echo "SBOM file missing, skipping attestation"
          fi
          rm cosign.key

      - name: Update Kustomize + Commit + Push (GitOps)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          git config --local user.email "aniketpurohit851@gmail.com"
          git config --local user.name "aniketpuro"
          
          # Ensure we're on main and up-to-date BEFORE modifying files
          git fetch origin main
          git checkout main
          git pull --rebase origin main

          cd kubernetes/manifests/converter
          kustomize edit set image ${{ env.IMAGE_NAME }}=${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}
          cd -

          git add kubernetes/manifests/converter/kustomization.yaml

          # Only commit if there is an actual change
          if git diff --cached --quiet; then
            echo "No kustomize changes to commit."
            exit 0
          fi

          git commit -m "Update converter image tag to ${{ env.COMMIT_SHA }} [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
