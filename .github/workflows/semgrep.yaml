name: Semgrep SAST Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  semgrep:
    name: Security Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        # We target ONLY the source code directories and exclude infrastructure/tests
        run: |
          semgrep scan --config auto --config p/default --config p/security-audit --error \
            src/ \
            --exclude='**/test_*.py' \
            --exclude='terraform/'
