name: Semgrep SAST Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * 1' # Har Monday ko scan chalega

jobs:
  semgrep:
    name: Security Scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep Scan
        run: |
          semgrep scan --config auto --config p/default --config p/security-audit --error

      # Optional: Upload results to GitHub Security Tab (if you have Advanced Security enabled)
      # - name: Upload SARIF file for GitHub Advanced Security
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: semgrep.sarif
      #   if: always()
