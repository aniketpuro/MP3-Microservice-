name: Frontend Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'src/frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/frontend/**'

env:
  IMAGE_NAME: aniketpuro/frontend-service

permissions:
  contents: write

jobs:
  build-test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short Commit SHA
        id: vars
        run: echo "COMMIT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: cd src/frontend && npm ci

      - name: Run Linter
        run: cd src/frontend && npm run lint

      - name: Build Check
        run: cd src/frontend && npm run build

      - name: Build Docker Image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} ./src/frontend

      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft docker:${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} -o spdx-json > sbom-frontend-${{ env.COMMIT_SHA }}.json
          if [ ! -s sbom-frontend-${{ env.COMMIT_SHA }}.json ]; then echo "SBOM file is empty or not created"; exit 1; fi
          ls -l sbom-frontend-${{ env.COMMIT_SHA }}.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        if: github.event_name == 'push'
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}
          docker tag ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Sign Image and Attach SBOM
        if: github.event_name == 'push'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          # Sign the image
          cosign sign --key cosign.key ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} --yes
          # Attest the SBOM
          if [ -f sbom-frontend-${{ env.COMMIT_SHA }}.json ]; then
            cosign attest --key cosign.key --predicate sbom-frontend-${{ env.COMMIT_SHA }}.json --type spdxjson ${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }} --yes
          else
            echo "SBOM file missing, skipping attestation"
          fi
          rm cosign.key

      - name: Update Kustomize
        if: github.event_name == 'push'
        run: |
          cd kubernetes/manifests/frontend
          kustomize edit set image ${{ env.IMAGE_NAME }}=${{ env.IMAGE_NAME }}:${{ env.COMMIT_SHA }}

      - name: Commit and Push Changes (GitOps)
        if: github.event_name == 'push'
        run: |
          git config --local user.email "aniketpurohit851@gmail.com"
          git config --local user.name "aniketpuro"
          git add kubernetes/manifests/frontend/kustomization.yaml
          git commit -m "Update frontend image tag to ${{ env.COMMIT_SHA }} [skip ci]"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
