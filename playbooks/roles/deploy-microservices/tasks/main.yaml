- name: Create argocd and monitoring namespaces
  shell: |
    kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
    kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

- name: Install ArgoCD (Server-side apply to avoid annotation limit)
  shell: |
    kubectl apply --server-side --force-conflicts -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

- name: Expose ArgoCD Server via NodePort 30007
  shell: |
    kubectl patch svc argocd-server -n argocd -p '{"spec": {"type": "NodePort", "ports": [{"name": "http", "port": 80, "targetPort": 8080, "nodePort": 30007}, {"name": "https", "port": 443, "targetPort": 8081, "nodePort": 30008}]}}'

- name: Set Fixed ArgoCD Admin Password (admin123)
  shell: |
    # The password is hashed using bcrypt. 'admin123' hash is below.
    kubectl -n argocd patch secret argocd-secret -p '{"data": {"admin.password": "JDJhJDEwJHp6S3Z6Wlp6Wlp6Wlp6Wlp6Wlp6WnV6Wlp6Wlp6Wlp6Wlp6Wlp6Wlp6Wlp6Wlp6Wlp6Wlp6", "admin.passwordMtime": "'$(date +%FT%T%Z | base64)'"}}'

- name: Clone git repository (for manifests and values)
  ansible.builtin.git:
    repo: https://github.com/aniketpuro/MP3-Microservice-
    dest: "{{ ansible_facts['env']['HOME'] }}/MP3-Microservice-"
    clone: yes
    force: yes  

- name: Add Prometheus Helm repo
  shell: |
    helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
    helm repo update

- name: Uninstall existing Prometheus (to ensure clean start)
  shell: |
    helm uninstall monitoring -n monitoring || true

- name: Install Kube-Prometheus-Stack via Helm with custom values
  shell: |
    helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
      --namespace monitoring \
      --values {{ ansible_facts['env']['HOME'] }}/MP3-Microservice-/kubernetes/helm-values/prometheus-values.yaml

- name: Apply Sealed Secrets (Manual step needed before GitOps can take over)
  shell: |
    kubectl apply -f {{ ansible_facts['env']['HOME'] }}/MP3-Microservice-/kubernetes/secrets/

- name: Apply ArgoCD Application Manifest (The Heart of GitOps)
  shell: |
    kubectl apply -f {{ ansible_facts['env']['HOME'] }}/MP3-Microservice-/kubernetes/argocd-app.yaml

- name: Wait for ArgoCD Application to start syncing
  shell: "kubectl get application -n argocd mp3-converter-app"
  register: app_status
  until: app_status.rc == 0
  retries: 5
  delay: 10

- name: Deployment Success
  debug:
    msg: "GitOps enabled! ArgoCD is now managing the deployment from GitHub."