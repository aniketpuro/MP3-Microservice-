apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mp3-converter-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aniketpuro/MP3-Microservice-
    targetRevision: HEAD
    path: kubernetes/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
