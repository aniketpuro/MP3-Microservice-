apiVersion: v1
kind: ConfigMap
metadata:
  name: quick-health-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  quick-health.json: |
    {
      "title": "QUICK HEALTH OVERVIEW",
      "uid": "quick-health",
      "tags": ["fast", "monitoring"],
      "timezone": "browser",
      "schemaVersion": 37,
      "panels": [
        {
          "type": "stat",
          "title": "API Gateway Status",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(up{app=\"gateway\"})" }],
          "options": { "colorMode": "background", "textMode": "name" }
        },
        {
          "type": "stat",
          "title": "Total RPS",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(rate(flask_http_request_duration_seconds_count[1m]))" }],
          "options": { "graphMode": "area" }
        },
        {
          "type": "stat",
          "title": "Error % (1m)",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(rate(flask_http_request_duration_seconds_count{status_code=~\"5..\"}[1m])) / sum(rate(flask_http_request_duration_seconds_count[1m])) * 100" }],
          "fieldConfig": { "defaults": { "unit": "percent", "thresholds": { "steps": [{"color": "green", "value": null}, {"color": "red", "value": 5}] } } }
        },
        {
          "type": "stat",
          "title": "Active Pods",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "sum(kube_pod_status_phase{phase=\"Running\"})" }]
        },
        {
          "type": "timeseries",
          "title": "Latency Heatmap (P95)",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le, app))", "legendFormat": "{{app}}" }]
        }
      ]
    }
