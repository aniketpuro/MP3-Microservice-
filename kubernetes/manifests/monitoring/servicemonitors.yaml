apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: microservices-monitor
  labels:
    release: prometheus # Must match the release name of your prometheus stack
spec:
  selector:
    matchLabels:
      app: auth
  endpoints:
  - port: web
    path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gateway-monitor
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: gateway
  endpoints:
  - port: web
    path: /metrics
