apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-tag
  annotations:
    policies.kyverno.io/title: Restrict Image Tags
    policies.kyverno.io/description: >-
      Using the 'latest' tag is a bad practice. This policy ensures
      that all images use a specific tag or digest.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-image-tag
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Using the 'latest' tag is not allowed. Please use a specific version or commit SHA tag."
        pattern:
          spec: # nosemgrep
            containers:
              - image: "!*:latest"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-security-context
  annotations:
    policies.kyverno.io/title: Require Pod Security Context
    policies.kyverno.io/description: >-
      Enforces Pod Security Standards by requiring non-root users and 
      dropping all capabilities.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-security-context
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "Pod must have runAsNonRoot set to true and drop all capabilities."
        pattern:
          spec: # nosemgrep
            securityContext:
              runAsNonRoot: true
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signature
  annotations:
    policies.kyverno.io/title: Verify Image Signature
    policies.kyverno.io/description: >-
      Ensures that only images signed with the trusted cosign key are allowed.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: verify-signature
      match:
        any:
        - resources:
            kinds:
              - Pod
      verifyImages:
        - imageReferences:
            - "aniketpuro/*"
          attestors:
            - entries:
                - keys:
                    publicKeys: |
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEP99Iof+V7oGvK8YFv6lV4jK3+nZ+
                      y2Q5uD4t2C7p3vH6v+9yQZJ8f7lR3u5Y5+oJ6lO6U5L7E9vW9I6/l2+v5w==
                      -----END PUBLIC KEY-----
